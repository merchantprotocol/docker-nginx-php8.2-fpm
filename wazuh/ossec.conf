<ossec_config>

  <!-- Wazuh Manager connection - override WAZUH_MANAGER env at runtime -->
  <client>
    <server>
      <address>wazuh-manager</address>
      <port>1514</port>
      <protocol>tcp</protocol>
    </server>
    <notify_time>10</notify_time>
    <time-reconnect>60</time-reconnect>
  </client>

  <!-- Nginx access logs (security format) -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/nginx/access.log</location>
  </localfile>

  <!-- Nginx access logs (JSON format for structured parsing) -->
  <localfile>
    <log_format>json</log_format>
    <location>/var/log/nginx/access.json.log</location>
  </localfile>

  <!-- Nginx error logs -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/nginx/error.log</location>
  </localfile>

  <!-- ModSecurity WAF audit log -->
  <localfile>
    <log_format>audit</log_format>
    <location>/var/log/modsec/audit.log</location>
  </localfile>

  <!-- PHP-FPM error log -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/php-fpm/error.log</location>
  </localfile>

  <!-- Cron logs -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/cron.log</location>
  </localfile>

  <!-- Supervisor logs -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/supervisor/supervisord.log</location>
  </localfile>

  <!-- File Integrity Monitoring (SOC 2 requirement) -->
  <syscheck>
    <disabled>no</disabled>
    <frequency>3600</frequency>
    <scan_on_start>yes</scan_on_start>

    <!-- Monitor web root for unauthorized changes -->
    <directories check_all="yes" realtime="yes" report_changes="yes">/var/www/html</directories>

    <!-- Monitor nginx config for tampering -->
    <directories check_all="yes" realtime="yes" report_changes="yes">/etc/nginx</directories>

    <!-- Monitor PHP config -->
    <directories check_all="yes" realtime="yes" report_changes="yes">/etc/php</directories>

    <!-- Monitor cron for unauthorized scheduled tasks -->
    <directories check_all="yes" realtime="yes" report_changes="yes">/etc/cron.d</directories>

    <!-- Monitor ModSecurity rules -->
    <directories check_all="yes" realtime="yes">/etc/nginx/modsec</directories>

    <!-- Monitor system auth files -->
    <directories check_all="yes" realtime="yes" report_changes="yes">/etc/passwd</directories>
    <directories check_all="yes" realtime="yes" report_changes="yes">/etc/shadow</directories>
    <directories check_all="yes" realtime="yes" report_changes="yes">/etc/group</directories>

    <!-- Ignore noisy paths -->
    <ignore>/var/www/html/storage</ignore>
    <ignore>/var/www/html/cache</ignore>
    <ignore type="sregex">.log$</ignore>
    <ignore type="sregex">.swp$</ignore>
  </syscheck>

  <!-- Rootkit detection -->
  <rootcheck>
    <disabled>no</disabled>
    <frequency>43200</frequency>
  </rootcheck>

  <!-- Active response - block IPs that trigger WAF rules -->
  <active-response>
    <disabled>no</disabled>
  </active-response>

  <!-- Log rotation awareness -->
  <logging>
    <log_format>plain</log_format>
  </logging>

</ossec_config>
