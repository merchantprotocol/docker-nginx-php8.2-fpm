name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Describe the feature you'd like to see added to the image.

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Nginx configuration
        - PHP extensions / configuration
        - Security / WAF rules
        - Monitoring / SIEM
        - Logging
        - Build / CI pipeline
        - Documentation
        - Testing
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? Why is it needed?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should this work?
    validations:
      required: true

  - type: dropdown
    id: soc2
    attributes:
      label: SOC 2 Relevance
      description: Does this relate to a SOC 2 control?
      options:
        - "Not applicable"
        - "CC6.1 — Logical access controls"
        - "CC6.6 — System boundary protection"
        - "CC6.7 — Encryption in transit"
        - "CC7.1 — Monitoring and detection"
        - "CC7.2 — Incident response"
        - "CC8.1 — Change management"

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any other approaches you've considered
