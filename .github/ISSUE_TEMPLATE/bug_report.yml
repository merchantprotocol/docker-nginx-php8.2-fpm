name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill out the sections below so we can reproduce and fix the issue.

  - type: input
    id: version
    attributes:
      label: Image Version
      description: The image tag or commit SHA you're running
      placeholder: "latest, v1.2.0, abc1234"
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Affected Component
      options:
        - Nginx
        - PHP-FPM
        - ModSecurity / WAF
        - TLS / SSL
        - Wazuh / SIEM
        - Cron
        - Supervisord
        - Docker Build
        - Permissions / UID Mapping
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened and what did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the issue
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Paste any relevant container logs, nginx error logs, or test output
      render: shell

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Host OS, Docker version, architecture
      value: |
        - Host OS:
        - Docker version:
        - Architecture (amd64/arm64):
